<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AirConnect</title>

  <!-- Tailwind CSS (JIT via CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif:    ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans:     ['Barlow', 'system-ui', 'sans-serif'],
            condensed:['"Barlow Condensed"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── Autofill override (keep dark bg) ── */
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #f4f1eb;
      -webkit-box-shadow: 0 0 0 1000px #121212 inset;
    }

    /* ── Subtle card float ── */
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-10px) rotate(-2deg); }
    }
    .card-float { animation: cardFloat 6s ease-in-out infinite; }

    /* ── NFC pulse rings ── */
    @keyframes nfcPulse {
      0%   { transform: translate(-50%, -50%) scale(.1); opacity: .9; }
      100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
    }
    .nfc-ring { animation: nfcPulse 2.8s ease-out infinite; }
    .nfc-ring:nth-child(2) { animation-delay: .95s; }
    .nfc-ring:nth-child(3) { animation-delay: 1.9s; }

    /* ── Panel transition ── */
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .panel-in { animation: panelIn .32s cubic-bezier(.4,0,.2,1) forwards; }

    /* ── Gold shimmer on CTA ── */
    .btn-gold {
      background: #c9a84c;
      position: relative;
      overflow: hidden;
      transition: background .3s, letter-spacing .3s;
    }
    .btn-gold::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #090909;
      transform: scaleX(0);
      transform-origin: right;
      transition: transform .4s cubic-bezier(.7,0,.3,1);
    }
    .btn-gold:hover { background: #e2cb7a; letter-spacing: .34em; }
    .btn-gold:hover::after { transform: scaleX(1); transform-origin: left; }
    .btn-gold span { position: relative; z-index: 1; }
    .btn-gold:hover span { color: #e2cb7a; }
  </style>
</head>

<body class="bg-[#090909] font-sans text-white min-h-screen overflow-hidden">

  <div class="flex min-h-screen">

    <!-- ════════════════════════════════════════════════════
         LEFT PANEL — Brand + Card
    ═════════════════════════════════════════════════════ -->
    <div class="hidden lg:flex flex-col justify-between w-[55%] relative overflow-hidden"
         style="background: linear-gradient(155deg, #0f0e08 0%, #090909 50%, #0a0a0a 100%);">

      <!-- Ambient gold glow -->
      <div class="absolute inset-0 pointer-events-none">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px]"
             style="background: radial-gradient(ellipse, rgba(201,168,76,.06) 0%, transparent 65%);"></div>
        <!-- Diagonal stripe texture -->
        <div class="absolute inset-0"
             style="background-image: repeating-linear-gradient(135deg, transparent 0, transparent 22px, rgba(201,168,76,.015) 22px, rgba(201,168,76,.015) 23px);"></div>
        <!-- Right border divider -->
        <div class="absolute top-0 right-0 bottom-0 w-px"
             style="background: linear-gradient(to bottom, transparent 0%, rgba(201,168,76,.2) 25%, rgba(201,168,76,.2) 75%, transparent 100%);"></div>
      </div>

      <!-- Logo -->
      <div class="relative z-10 p-12">
        <a href="index.html" class="font-condensed font-semibold text-lg tracking-[.28em] uppercase text-white">
          Air<span style="color:#c9a84c">Connect</span>
        </a>
      </div>

      <!-- Card image + glow -->
      <div class="relative z-10 flex justify-center items-center" style="padding: 0 60px;">

        <!-- Glow under card -->
        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-64 h-16 blur-2xl rounded-full"
             style="background: rgba(201,168,76,.12);"></div>

        <!-- NFC rings (positioned relative to card) -->
        <div class="relative">
          <img src="card.png"
               alt="AirConnect Premium NFC Card"
               class="card-float relative z-10 select-none"
               style="width: 340px;
                      filter: drop-shadow(0 4px 12px rgba(201,168,76,.4))
                              drop-shadow(0 24px 60px rgba(0,0,0,.9))
                              drop-shadow(0 60px 100px rgba(0,0,0,.7));
                      -webkit-user-drag: none;">

          <!-- NFC tap pulse — anchored to bottom-left of card (chip area) -->
          <div class="absolute z-20 pointer-events-none"
               style="bottom: 28%; left: 22%; width: 1px; height: 1px;">
            <div class="nfc-ring absolute w-10 h-10 rounded-full border border-[#c9a84c]/60"
                 style="left:50%; top:50%;"></div>
            <div class="nfc-ring absolute w-10 h-10 rounded-full border border-[#c9a84c]/60"
                 style="left:50%; top:50%;"></div>
            <div class="nfc-ring absolute w-10 h-10 rounded-full border border-[#c9a84c]/60"
                 style="left:50%; top:50%;"></div>
          </div>
        </div>
      </div>

      <!-- Tagline -->
      <div class="relative z-10 p-12">
        <p class="font-serif text-[30px] font-light leading-snug" style="color: rgba(244,241,235,.78);">
          The card that<br>
          <em style="color: #e2cb7a;">closes deals.</em>
        </p>
        <p class="font-condensed text-[10px] tracking-[.3em] uppercase mt-4"
           style="color: rgba(244,241,235,.22);">One tap. Saved forever.</p>
      </div>

    </div><!-- /left panel -->


    <!-- ════════════════════════════════════════════════════
         RIGHT PANEL — Auth forms
    ═════════════════════════════════════════════════════ -->
    <div class="flex-1 flex flex-col items-center justify-center px-8 py-16 lg:px-14"
         style="background: #0a0a0a;">

      <!-- Mobile logo -->
      <div class="lg:hidden mb-10">
        <a href="index.html" class="font-condensed font-semibold text-lg tracking-[.28em] uppercase text-white">
          Air<span style="color:#c9a84c">Connect</span>
        </a>
      </div>

      <!-- Form container — max width keeps it tight & premium -->
      <div class="w-full" style="max-width: 340px;">

        <!-- ─────────────────────────────────────────────
             LOGIN PANEL
        ────────────────────────────────────────────── -->
        <div id="loginPanel" class="panel-in">

          <!-- Eyebrow + Heading -->
          <div class="mb-10">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-6 h-px" style="background: #c9a84c;"></div>
              <span class="font-condensed text-[10px] tracking-[.35em] uppercase"
                    style="color: #c9a84c;">Welcome Back</span>
            </div>
            <h1 class="font-serif font-light text-white" style="font-size: 44px; line-height: 1;">
              Sign in.
            </h1>
            <p class="font-sans font-light text-[13px] mt-2" style="color: rgba(244,241,235,.38);">
              Access your AirConnect dashboard
            </p>
          </div>

          <!--
            LOGIN FORM
            Backend: POST /api/auth/login
            Body: { username: string, password: string }
            Success: redirect to /dashboard
            Error: show #loginError
          -->
          <form id="loginForm" class="space-y-5" novalidate>

            <!-- Username field -->
            <div class="space-y-2">
              <label for="username"
                     class="block font-condensed text-[10px] tracking-[.25em] uppercase"
                     style="color: rgba(201,168,76,.7);">Username</label>
              <input id="username"
                     name="username"
                     type="text"
                     autocomplete="username"
                     required
                     placeholder="your_username"
                     class="w-full px-4 py-3.5 font-sans text-[14px] font-light text-white
                            outline-none transition-all duration-200 placeholder:text-white/20"
                     style="background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);"
                     onfocus="this.style.borderColor='rgba(201,168,76,.5)';this.style.background='rgba(255,255,255,.06)'"
                     onblur="this.style.borderColor='rgba(255,255,255,.08)';this.style.background='rgba(255,255,255,.04)'">
            </div>

            <!-- Password field -->
            <div class="space-y-2">
              <label for="password"
                     class="block font-condensed text-[10px] tracking-[.25em] uppercase"
                     style="color: rgba(201,168,76,.7);">Password</label>
              <input id="password"
                     name="password"
                     type="password"
                     autocomplete="current-password"
                     required
                     placeholder="••••••••"
                     class="w-full px-4 py-3.5 font-sans text-[14px] font-light text-white
                            outline-none transition-all duration-200 placeholder:text-white/20"
                     style="background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);"
                     onfocus="this.style.borderColor='rgba(201,168,76,.5)';this.style.background='rgba(255,255,255,.06)'"
                     onblur="this.style.borderColor='rgba(255,255,255,.08)';this.style.background='rgba(255,255,255,.04)'">
            </div>

            <!-- Error message slot — backend populates this -->
            <p id="loginError" class="hidden font-sans text-[12px]" style="color:#e57373;"></p>

            <!-- Sign In CTA -->
            <div class="pt-1">
              <button type="submit"
                      id="signInBtn"
                      class="btn-gold w-full py-4 font-condensed font-bold text-[11px] tracking-[.28em] uppercase text-black">
                <span>Sign In →</span>
              </button>
            </div>

          </form>

          <!-- Forgot password link -->
          <div class="mt-7 text-center">
            <button id="forgotBtn"
                    type="button"
                    class="font-sans text-[12px] transition-colors duration-200
                           hover:text-[#c9a84c]"
                    style="color: rgba(244,241,235,.28);">
              Forgot Password?
            </button>
          </div>

        </div><!-- /loginPanel -->


        <!-- ─────────────────────────────────────────────
             RESET PANEL
        ────────────────────────────────────────────── -->
        <div id="resetPanel" class="hidden">

          <!-- Eyebrow + Heading -->
          <div class="mb-10">
            <div class="flex items-center gap-3 mb-4">
              <div class="w-6 h-px" style="background: #c9a84c;"></div>
              <span class="font-condensed text-[10px] tracking-[.35em] uppercase"
                    style="color: #c9a84c;">Password Reset</span>
            </div>
            <h1 class="font-serif font-light text-white" style="font-size: 44px; line-height: 1;">
              Reset.
            </h1>
            <p class="font-sans font-light text-[13px] mt-3 leading-relaxed"
               style="color: rgba(244,241,235,.38);">
              Enter your email to receive<br>a password reset link.
            </p>
          </div>

          <!--
            RESET FORM
            Backend: POST /api/auth/forgot-password
            Body: { email: string }
            Success: show #resetSuccess, hide form
            Error: show #resetError
          -->
          <form id="resetForm" class="space-y-5" novalidate>

            <!-- Email field -->
            <div class="space-y-2">
              <label for="resetEmail"
                     class="block font-condensed text-[10px] tracking-[.25em] uppercase"
                     style="color: rgba(201,168,76,.7);">Email</label>
              <input id="resetEmail"
                     name="email"
                     type="email"
                     autocomplete="email"
                     required
                     placeholder="you@example.com"
                     class="w-full px-4 py-3.5 font-sans text-[14px] font-light text-white
                            outline-none transition-all duration-200 placeholder:text-white/20"
                     style="background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);"
                     onfocus="this.style.borderColor='rgba(201,168,76,.5)';this.style.background='rgba(255,255,255,.06)'"
                     onblur="this.style.borderColor='rgba(255,255,255,.08)';this.style.background='rgba(255,255,255,.04)'">
            </div>

            <!-- Error / Success message slots -->
            <p id="resetError"   class="hidden font-sans text-[12px]" style="color:#e57373;"></p>
            <p id="resetSuccess" class="hidden font-sans text-[12px]" style="color:#81c784;">
              ✓ Reset link sent — check your inbox.
            </p>

            <!-- Send Reset Link CTA -->
            <div class="pt-1">
              <button type="submit"
                      id="sendResetBtn"
                      class="btn-gold w-full py-4 font-condensed font-bold text-[11px] tracking-[.28em] uppercase text-black">
                <span>Send Reset Link →</span>
              </button>
            </div>

          </form>

          <!-- Back to login -->
          <div class="mt-7 text-center">
            <button id="backBtn"
                    type="button"
                    class="font-sans text-[12px] transition-colors duration-200
                           hover:text-[#c9a84c] flex items-center gap-2 mx-auto"
                    style="color: rgba(244,241,235,.28);">
              ← Back to Sign In
            </button>
          </div>

        </div><!-- /resetPanel -->

      </div><!-- /form container -->

      <!-- Back to homepage -->
      <div class="mt-14">
        <a href="index.html"
           class="font-condensed text-[10px] tracking-[.22em] uppercase
                  transition-colors duration-200 hover:text-white/40"
           style="color: rgba(244,241,235,.18);">
          ← Back to AirConnect
        </a>
      </div>

    </div><!-- /right panel -->

  </div><!-- /flex container -->


  <!-- ════════════════════════════════════════════════════
       JAVASCRIPT — Panel switching + form stub hooks
       Backend dev: replace the TODO blocks with real API calls
  ═════════════════════════════════════════════════════ -->
  <script>
    // ── Element refs ──────────────────────────────────────────
    const loginPanel = document.getElementById('loginPanel');
    const resetPanel = document.getElementById('resetPanel');

    // ── Helpers ───────────────────────────────────────────────
    function showPanel(show, hide) {
      hide.classList.add('hidden');
      hide.classList.remove('panel-in');
      show.classList.remove('hidden');
      // Re-trigger animation
      void show.offsetWidth;
      show.classList.add('panel-in');
    }

    function setError(el, msg) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function clearMessages(...els) {
      els.forEach(el => { el.textContent = ''; el.classList.add('hidden'); });
    }

    // ── Forgot password → reset panel ─────────────────────────
    document.getElementById('forgotBtn').addEventListener('click', () => {
      showPanel(resetPanel, loginPanel);
    });

    // ── Back to login panel ────────────────────────────────────
    document.getElementById('backBtn').addEventListener('click', () => {
      clearMessages(
        document.getElementById('resetError'),
        document.getElementById('resetSuccess')
      );
      document.getElementById('resetForm').reset();
      showPanel(loginPanel, resetPanel);
    });

    // ── Login form submit ──────────────────────────────────────
    // TODO (backend): Replace body of this handler with your auth fetch()
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loginError = document.getElementById('loginError');
      clearMessages(loginError);

      const payload = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };

      // ── Backend integration point ──
      // const res  = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      // const data = await res.json();
      // if (!res.ok) { setError(loginError, data.message || 'Invalid credentials.'); return; }
      // window.location.href = '/dashboard';

      console.log('[AirConnect Login] Payload:', payload);
    });

    // ── Reset form submit ──────────────────────────────────────
    // TODO (backend): Replace body of this handler with your forgot-password fetch()
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const resetError   = document.getElementById('resetError');
      const resetSuccess = document.getElementById('resetSuccess');
      clearMessages(resetError, resetSuccess);

      const payload = {
        email: document.getElementById('resetEmail').value.trim(),
      };

      // ── Backend integration point ──
      // const res  = await fetch('/api/auth/forgot-password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      // const data = await res.json();
      // if (!res.ok) { setError(resetError, data.message || 'Something went wrong.'); return; }
      // resetSuccess.classList.remove('hidden');
      // document.getElementById('sendResetBtn').disabled = true;

      console.log('[AirConnect Reset] Payload:', payload);
      // Preview feedback (remove once backend is wired):
      resetSuccess.classList.remove('hidden');
    });
  </script>

</body>
</html>
